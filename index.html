    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(

      width: 60px;
      height: 1px;

      font-style: italic;

      animation: fadeUp 1.8s 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    h1 em {
      font-style: italic;
      color: #d4b896;
    }

    .subtitle {
      font-family: "Montserrat", sans-serif;
      font-weight: 200;
      font-size: clamp(0.75rem, 1.8vw, 0.92rem);

      letter-spacing: 0.45em;
      text-transform: uppercase;
      margin-top: 1.8rem;
      margin-bottom: 0.6rem;
      animation: fadeUp 1.8s 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .tagline {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.2rem, 3vw, 1.7rem);      
      letter-spacing: 0.06em;
      animation: fadeUp 1.8s 0.65s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .tagline, .subtitle, .email, .divider-text {
  color: rgba(255, 255, 255, 0.85);
}

    .divider {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, transparent, rgba(210,190,155,0.5), transparent);
      margin: 2.2rem auto;
      animation: fadeUp 1.8s 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .contact {
      font-family: "Montserrat", sans-serif;
      font-weight: 300;
      font-size: clamp(0.65rem, 1.3vw, 0.72rem);
      letter-spacing: 0.25em;
      color: rgba(200, 180, 150, 0.85);
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.3s ease;
      animation: fadeUp 1.8s 0.95s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .contact:hover { color: rgba(210,190,155,0.95); }

    .bottom-bar {
      position: absolute;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      font-family: "Montserrat", sans-serif;
      font-weight: 200;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: rgba(180,160,130,0.35);
      text-transform: uppercase;
      z-index: 10;
    }
